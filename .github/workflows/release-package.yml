name: Release package

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-release-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Build release zip
        run: |
          mkdir -p dist
          zip -r dist/drachometer.zip \
            README.md \
            coin.svg \
            hooks \
            drachometer-install.bat \
            drachometer-install.ps1 \
            drachometer-install.py \
            drachometer-install.sh \
            migrations \
            drachometer-pricing.json \
            drachometer-dashboard.html \
            drachometer-serve-dashboard.py \
            drachometer_mesh.py \
            drachometer-version.json

      - name: Upload release zip
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: dist/drachometer.zip
